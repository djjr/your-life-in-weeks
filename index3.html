<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This Is Your Life In Weeks</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    #container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .decade-label {
      margin: 4px 0 0 0;
      font-size: 12px;
      color: #666;
    }
    .week, .spacer {
      width: 10px;
      height: 10px;
      box-sizing: border-box;
    }
    .week {
      background-color: #eee;
      position: relative;
      cursor: pointer;
    }
    .week.past {
      background-color: #746eef;
    }
    .week.has-artifacts {
      background-color: #ff9500;
    }
    .week.past.has-artifacts {
      background-color: #ff6b00;
    }
    .week.selected {
      outline: 2px solid #333;
      outline-offset: 1px;
      z-index: 1;
    }
    .spacer {
      background-color: #fff;
      border: 1px solid #fff;
    }

    /* Hover tooltip — read-only, follows cursor, never blocks mouse */
    #hover-tooltip {
      position: fixed;
      pointer-events: none;
      display: none;
      z-index: 50;
      background: rgba(0,0,0,0.72);
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
    }

    /* Right-side panel */
    #panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 460px;
      background: #fff;
      border-left: 1px solid #ddd;
      box-shadow: -4px 0 20px rgba(0,0,0,0.12);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    #panel.open {
      transform: translateX(0);
    }
    #panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    #panel-week-info {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    #panel-week-info strong {
      display: block;
      font-size: 16px;
      color: #222;
      margin-bottom: 2px;
    }
    #panel-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #aaa;
      padding: 0 0 0 12px;
      line-height: 1;
      flex-shrink: 0;
    }
    #panel-close:hover { color: #333; }
    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    /* Artifact list */
    .artifact-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .artifact-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #eee;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .artifact-list li:hover {
      background: #f5f5f5;
      border-color: #ddd;
    }
    .artifact-type-badge {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      color: #888;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .artifact-list-title {
      font-size: 13px;
      color: #222;
      flex: 1;
    }
    .artifact-list-arrow {
      color: #ccc;
      font-size: 16px;
      flex-shrink: 0;
    }
    .no-artifacts {
      color: #999;
      font-size: 13px;
      font-style: italic;
    }

    /* Artifact viewer */
    #panel-back {
      background: none;
      border: none;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      padding: 0 0 14px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #panel-back:hover { color: #333; }
    .artifact-viewer-title {
      font-size: 15px;
      font-weight: bold;
      color: #222;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .artifact-viewer-content iframe {
      width: 100%;
      height: 70vh;
      border: none;
    }
    .artifact-viewer-content img {
      max-width: 100%;
    }
    .artifact-viewer-content video,
    .artifact-viewer-content audio {
      width: 100%;
      margin-top: 8px;
    }
    .artifact-unavailable {
      font-size: 12px;
      color: #aaa;
      font-style: italic;
      margin-bottom: 16px;
    }
    .artifact-meta {
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    .artifact-meta summary {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      cursor: pointer;
      user-select: none;
      margin-bottom: 10px;
    }
    .artifact-meta summary:hover { color: #555; }
    .artifact-meta-kv {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 12px;
      margin: 8px 0 12px;
    }
    .artifact-meta-kv dt {
      color: #999;
      font-weight: bold;
      white-space: nowrap;
    }
    .artifact-meta-kv dd {
      margin: 0;
      color: #444;
    }
    .artifact-meta-section {
      margin-top: 12px;
    }
    .artifact-meta-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin: 0 0 6px;
    }
    .artifact-meta-section p {
      font-size: 13px;
      color: #444;
      margin: 0;
      line-height: 1.5;
    }
    .artifact-transcription {
      font-size: 12px;
      color: #444;
      white-space: pre-wrap;
      font-family: Georgia, serif;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>This Is Your Life In Weeks<br><span style="font-size: 0.25em;">Inspired by Dr. Peter Attia</span></h1>
  <div style="font-size: 11px; color: #aaa; margin-bottom: 8px;">v0.4 (20260327)</div>

  <label for="birthdate">Enter your birthdate (YYYY-MM-DD): </label>
  <input type="date" id="birthdate">
  <button onclick="generateGrid()">Generate</button>

  <div id="container"></div>

  <div id="hover-tooltip"></div>

  <div id="panel">
    <div id="panel-header">
      <div id="panel-week-info"></div>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <script>
    let birthdate;
    let weeksData = {};
    let allItems = [];
    let vaultBaseUrl = null;
    let currentWeekIndex = null;

    async function loadWeeksData() {
      try {
        const response = await fetch('weeks-index.json');
        const data = await response.json();

        vaultBaseUrl = data.baseUrl || null;
        allItems = data.artifacts;

        const artifactMap = {};
        data.artifacts.forEach(a => { artifactMap[a.id] = a; });

        weeksData = {};
        Object.entries(data.byWeek).forEach(([week, ids]) => {
          weeksData[parseInt(week)] = ids.map(id => artifactMap[id]).filter(Boolean);
        });

        if (data.birthdate) {
          const input = document.getElementById('birthdate');
          if (!input.value) input.value = data.birthdate;
        }

        console.log('Loaded weeks data:', Object.keys(weeksData).length, 'weeks with artifacts');
      } catch (error) {
        console.error('Failed to load weeks-index.json:', error);
      }
    }

    loadWeeksData();

    // --- Utilities ---

    function weekOrdinalSuffix(n) {
      if (n % 10 === 1 && n % 100 !== 11) return `${n}st`;
      if (n % 10 === 2 && n % 100 !== 12) return `${n}nd`;
      if (n % 10 === 3 && n % 100 !== 13) return `${n}rd`;
      return `${n}th`;
    }

    function weekDates(weekIndex) {
      const weekNumber = weekIndex + 1;
      const startDate = new Date(birthdate.getTime() + weekIndex * 7 * 24 * 60 * 60 * 1000);
      const endDate = new Date(startDate.getTime() + 6 * 24 * 60 * 60 * 1000);
      const opts = { year: 'numeric', month: 'short', day: 'numeric' };
      return {
        weekNumber,
        ordinal: weekOrdinalSuffix(weekNumber),
        startStr: startDate.toLocaleDateString('en-US', opts),
        endStr: endDate.toLocaleDateString('en-US', opts),
      };
    }

    function resolveArtifactUrl(artifact) {
      if (!artifact.url) {
        return vaultBaseUrl ? vaultBaseUrl.replace(/\/$/, '') + '/' + artifact.path : null;
      }
      if (!artifact.url.match(/^https?:\/\//)) {
        return vaultBaseUrl ? vaultBaseUrl.replace(/\/$/, '') + '/' + artifact.url : null;
      }
      return artifact.url;
    }

    // --- Hover tooltip ---

    function showHoverTooltip(weekIndex, e) {
      const tooltip = document.getElementById('hover-tooltip');
      const { ordinal, startStr, endStr } = weekDates(weekIndex);
      const artifacts = weeksData[weekIndex];
      let text = `${ordinal} week · ${startStr} – ${endStr}`;
      if (artifacts && artifacts.length > 0) {
        text += ` · ${artifacts.length} artifact${artifacts.length > 1 ? 's' : ''}`;
      }
      tooltip.textContent = text;
      tooltip.style.display = 'block';
      moveHoverTooltip(e);
    }

    function moveHoverTooltip(e) {
      document.getElementById('hover-tooltip').style.left = (e.clientX + 14) + 'px';
      document.getElementById('hover-tooltip').style.top  = (e.clientY + 14) + 'px';
    }

    function hideHoverTooltip() {
      document.getElementById('hover-tooltip').style.display = 'none';
    }

    // --- Panel ---

    function openPanel(weekIndex) {
      currentWeekIndex = weekIndex;
      const { ordinal, startStr, endStr } = weekDates(weekIndex);
      document.getElementById('panel-week-info').innerHTML =
        `<strong>Your ${ordinal} week</strong>${startStr} – ${endStr}`;
      showArtifactList(weekIndex);
      document.getElementById('panel').classList.add('open');
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('open');
      document.querySelectorAll('.week.selected').forEach(el => el.classList.remove('selected'));
      currentWeekIndex = null;
    }

    function showArtifactList(weekIndex) {
      const artifacts = weeksData[weekIndex] || [];
      const body = document.getElementById('panel-body');

      if (artifacts.length === 0) {
        body.innerHTML = '<p class="no-artifacts">No artifacts for this week yet.</p>';
        return;
      }

      const items = artifacts.map((artifact, idx) => {
        const badge = artifact.type
          ? `<span class="artifact-type-badge">${artifact.type}</span>` : '';
        return `<li data-idx="${idx}">
          ${badge}
          <span class="artifact-list-title">${artifact.title}</span>
          <span class="artifact-list-arrow">›</span>
        </li>`;
      }).join('');

      body.innerHTML = `<ul class="artifact-list">${items}</ul>`;

      body.querySelectorAll('li').forEach(li => {
        li.addEventListener('click', () => {
          showArtifactViewer(artifacts[parseInt(li.dataset.idx)], weekIndex);
        });
      });
    }

    function renderMetadata(artifact) {
      const kv = [];
      if (artifact.type) kv.push(['Type', artifact.type]);
      const dateStr = artifact.start
        ? (artifact.end && artifact.end !== artifact.start
            ? `${artifact.start} – ${artifact.end}`
            : artifact.start)
        : null;
      if (dateStr) kv.push(['Date', dateStr]);
      if (artifact.people && artifact.people.length) kv.push(['People', artifact.people.join(', ')]);
      if (artifact.location) kv.push(['Location', artifact.location]);
      if (artifact.source)   kv.push(['Source',   artifact.source]);
      if (artifact.tags && artifact.tags.length)   kv.push(['Tags', artifact.tags.join(', ')]);

      const parts = [];
      if (artifact.summary) {
        parts.push(`<div class="artifact-meta-section">
          <h4>Summary</h4><p>${artifact.summary}</p>
        </div>`);
      }
      if (artifact.transcription) {
        parts.push(`<div class="artifact-meta-section">
          <h4>Transcription</h4>
          <pre class="artifact-transcription">${artifact.transcription}</pre>
        </div>`);
      }
      if (kv.length) {
        parts.push(`<dl class="artifact-meta-kv">${
          kv.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')
        }</dl>`);
      }
      return parts.join('');
    }

    async function showArtifactViewer(artifact, weekIndex) {
      const body = document.getElementById('panel-body');
      const url = resolveArtifactUrl(artifact);
      const mediaType = artifact.media_type || '';

      // Media block
      let mediaHtml = '';
      let hasMedia = false;
      if (url && mediaType.startsWith('image/')) {
        mediaHtml = `<div class="artifact-viewer-content"><img src="${url}"></div>`;
        hasMedia = true;
      } else if (url && mediaType === 'application/pdf') {
        mediaHtml = `<div class="artifact-viewer-content"><iframe src="${url}"></iframe></div>`;
        hasMedia = true;
      } else if (url && mediaType.startsWith('video/')) {
        mediaHtml = `<div class="artifact-viewer-content"><video src="${url}" controls></video></div>`;
        hasMedia = true;
      } else if (url && mediaType.startsWith('audio/')) {
        mediaHtml = `<div class="artifact-viewer-content"><audio src="${url}" controls></audio></div>`;
        hasMedia = true;
      } else if (mediaType === 'text/plain' || mediaType === 'text/markdown') {
        if (url) {
          try {
            const response = await fetch(url);
            const raw = await response.text();
            const body = raw.replace(/^---[\s\S]*?---\n?/, '').trim();
            let html = body
              .replace(/^### (.+)$/gm, '<h3>$1</h3>')
              .replace(/^## (.+)$/gm, '<h2>$1</h2>')
              .replace(/^# (.+)$/gm, '<h1>$1</h1>')
              .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
              .replace(/\*(.+?)\*/g, '<em>$1</em>')
              .replace(/\n\n/g, '</p><p>')
              .replace(/\n/g, '<br>');
            mediaHtml = `<div class="artifact-viewer-content"><p>${html}</p></div>`;
            hasMedia = true;
          } catch {
            mediaHtml = `<p class="artifact-unavailable">File not available offline.</p>`;
          }
        } else {
          mediaHtml = `<p class="artifact-unavailable">File not available offline.</p>`;
        }
      } else {
        mediaHtml = `<p class="artifact-unavailable">File not available offline.</p>`;
      }

      // Metadata block — open by default when no media
      const metaBody = renderMetadata(artifact);
      const metaHtml = metaBody
        ? `<details class="artifact-meta" ${hasMedia ? '' : 'open'}>
            <summary>Details</summary>
            ${metaBody}
          </details>`
        : '';

      body.innerHTML = `
        <button id="panel-back">← Back to list</button>
        <div class="artifact-viewer-title">${artifact.title}</div>
        ${mediaHtml}
        ${metaHtml}
      `;

      document.getElementById('panel-back').addEventListener('click', () => {
        showArtifactList(weekIndex);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePanel();
    });

    // --- Grid ---

    function generateGrid() {
      const dateVal = document.getElementById("birthdate").value;
      const [year, month, day] = dateVal.split("-").map(Number);
      birthdate = new Date(Date.UTC(year, month - 1, day, 12));

      const now = new Date();
      const container = document.getElementById("container");
      container.innerHTML = "";
      const years = 100;
      const weeksPerYear = 52;

      for (let year = 0; year < years; year++) {
        if (year % 10 === 0) {
          const label = document.createElement("div");
          label.className = "decade-label";
          label.textContent = year === 0 ? "Hello" : `Age ${year}`;
          container.appendChild(label);
        }

        const grid = document.createElement("div");
        grid.className = "grid-row";
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(64, 12px)";
        grid.style.gap = "1px";

        for (let week = 0; week < weeksPerYear; week++) {
          if (week > 0 && week % 4 === 0) {
            const spacer = document.createElement("div");
            spacer.className = "spacer";
            grid.appendChild(spacer);
          }

          const i = year * weeksPerYear + week;
          const div = document.createElement("div");
          const nowWeek = Math.floor((now - birthdate) / (1000 * 60 * 60 * 24 * 7));
          const hasArtifacts = weeksData[i] && weeksData[i].length > 0;

          div.className = "week" +
            (i < nowWeek ? " past" : "") +
            (hasArtifacts ? " has-artifacts" : "");
          div.dataset.index = i;

          div.addEventListener("mouseenter", e => showHoverTooltip(i, e));
          div.addEventListener("mousemove",  e => moveHoverTooltip(e));
          div.addEventListener("mouseleave", ()  => hideHoverTooltip());
          div.addEventListener("click", () => {
            document.querySelectorAll('.week.selected').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            openPanel(i);
          });

          grid.appendChild(div);
        }

        container.appendChild(grid);
      }
    }
  </script>
</body>
</html>
